<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tailwind</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <div class="mx-55 mt-15 flex flex-wrap rounded-lg border-2 border-black">
        <div class="bg-linear-to-t from-sky-500 to-indigo-500 h-24 flex justify-center items-center w-full font-bold text-xl rounded-t">News you can trust</div>
        <div class="text-center mt-6 w-full">
            <h2>Stay up to date with the Latest!</h2>
            <p>Subscribe to our newsletter for the latest news straight into your inbox</p>
            <form class="flex flex-wrap">
                <input placeholder="example123@gmail.com" class="w-full mx-52 bg-slate-200 text-centre placeholder:text-sm my-4 py-2 rounded">
                <button class="w-100% bg-blue-500 text-white w-full mx-52 py-2 rounded-full">Subscribe</button>
            </form>
            <p class="my-6 text-sm text-gray-600"> Get in touch with <span class="font-semibold bg-gradient-to-r 
                from-blue-500 to-cyan-500 bg-clip-text text-transparent">Manish</span>
            </p>
        </div>
    </div>
</body>
</html>
